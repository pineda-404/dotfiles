# Opacidad
inactive-opacity = 1;  # Opacidad de ventanas inactivas (0.0 a 1.0)
active-opacity = 1;    # Opacidad de ventanas activas (0.0 a 1.0)
frame-opacity = 0.8;     # Opacidad de los bordes de la ventana
# inactive-opacity-override = false; # Si quieres que las reglas de opacidad de abajo anulen esta para inactivas

# Opacidad específica para ciertas ventanas (opcional)
#opacity-rule = [
#  "90:class_g = 'Alacritty'",
#  "90:class_g = 'kitty'",
#  "85:class_g = 'URxvt'",
#  "80:class_g = 'Gnome-terminal'"
#];

# Desvanecimiento (Fading)
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
# no-fading-openclose = true; # No hacer fade al abrir/cerrar

# Sombras (Shadows)
shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.75;
# shadow-exclude = [ ... ]; # Excluir sombras de ciertas ventanas

# Fondo borroso (Blur) - Puede consumir más recursos
# blur-background = true;
# blur-method = "dual_kawase";
# blur-strength = 5;

# Backend (importante para rendimiento y evitar "tearing")
# Prueba "glx" o "xrender". "glx" suele ser mejor si tienes drivers gráficos decentes.
backend = "glx";
vsync = true;

# Otras configuraciones
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
glx-no-stencil = true;
glx-copy-from-front = false;
